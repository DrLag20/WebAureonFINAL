<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="glowCenter" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f9cb42" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f9cb42" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9cb42" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f9cb42" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle star dots -->
  <circle cx="80" cy="60" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="30" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="55" r="1" fill="#ffffff" opacity="0.35"/>
  <circle cx="500" cy="20" r="1.3" fill="#ffffff" opacity="0.4"/>
  <circle cx="650" cy="70" r="0.9" fill="#ffffff" opacity="0.3"/>
  <circle cx="720" cy="40" r="1.1" fill="#ffffff" opacity="0.35"/>
  <circle cx="760" cy="120" r="0.8" fill="#ffffff" opacity="0.25"/>
  <circle cx="40" cy="200" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="770" cy="300" r="1.2" fill="#ffffff" opacity="0.3"/>
  <circle cx="30" cy="500" r="0.9" fill="#ffffff" opacity="0.25"/>
  <circle cx="780" cy="600" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="60" cy="720" r="1.1" fill="#ffffff" opacity="0.3"/>
  <circle cx="740" cy="760" r="0.8" fill="#ffffff" opacity="0.25"/>

  <!-- Outer decorative rings -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#534AB7" stroke-width="0.6" opacity="0.3" stroke-dasharray="4 8"/>
  <circle cx="400" cy="400" r="310" fill="none" stroke="#7F77DD" stroke-width="0.4" opacity="0.2"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#534AB7" stroke-width="0.6" opacity="0.25" stroke-dasharray="2 6"/>

  <!-- Center radial glow -->
  <circle cx="400" cy="400" r="220" fill="url(#centerGlow)"/>

  <!-- Inner circle platform -->
  <circle cx="400" cy="400" r="180" fill="#2d1b69" opacity="0.5"/>
  <circle cx="400" cy="400" r="180" fill="none" stroke="#AFA9EC" stroke-width="1" opacity="0.4"/>

  <!-- Central heart / unity symbol -->
  <g transform="translate(400,400)">
    <!-- Rays from center -->
    <line x1="0" y1="-60" x2="0" y2="-100" stroke="#f9cb42" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="-42" x2="71" y2="-71" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="0" x2="100" y2="0" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <line x1="42" y1="42" x2="71" y2="71" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="60" x2="0" y2="100" stroke="#f9cb42" stroke-width="1.5" opacity="0.6"/>
    <line x1="-42" y1="42" x2="-71" y2="71" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <line x1="-60" y1="0" x2="-100" y2="0" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <line x1="-42" y1="-42" x2="-71" y2="-71" stroke="#f9cb42" stroke-width="1.5" opacity="0.5"/>
    <!-- Central circle -->
    <circle cx="0" cy="0" r="24" fill="#f9cb42" opacity="0.9"/>
    <circle cx="0" cy="0" r="18" fill="#BA7517"/>
    <!-- Heart symbol inside -->
    <path d="M0,8 C0,8 -12,-4 -12,-10 C-12,-17 -6,-20 0,-14 C6,-20 12,-17 12,-10 C12,-4 0,8 0,8Z" fill="#f9cb42"/>
  </g>

  <!-- === FIGURES (8 people in a circle, radius ~230) === -->
  <!-- Each figure: head (circle) + body (trapezoid) + arms (lines) -->
  <!-- Positions at angles: 0°, 45°, 90°, 135°, 180°, 225°, 270°, 315° -->

  <!-- Figure 1 — top (270° = top) color: amber -->
  <g transform="translate(400,170)">
    <circle cx="0" cy="-38" r="16" fill="#EF9F27"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#EF9F27" opacity="0.9"/>
    <!-- Arms reaching sideways and in/out -->
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#EF9F27" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#EF9F27" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 2 — top-right (315°+45 = 45° offset from top) -->
  <g transform="translate(563,237) rotate(45)">
    <circle cx="0" cy="-38" r="16" fill="#5DCAA5"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#5DCAA5" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#5DCAA5" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#5DCAA5" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 3 — right -->
  <g transform="translate(630,400) rotate(90)">
    <circle cx="0" cy="-38" r="16" fill="#7F77DD"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#7F77DD" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#7F77DD" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#7F77DD" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 4 — bottom-right -->
  <g transform="translate(563,563) rotate(135)">
    <circle cx="0" cy="-38" r="16" fill="#F0997B"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#F0997B" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#F0997B" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#F0997B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 5 — bottom -->
  <g transform="translate(400,630) rotate(180)">
    <circle cx="0" cy="-38" r="16" fill="#97C459"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#97C459" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#97C459" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#97C459" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 6 — bottom-left -->
  <g transform="translate(237,563) rotate(225)">
    <circle cx="0" cy="-38" r="16" fill="#85B7EB"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#85B7EB" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#85B7EB" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#85B7EB" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 7 — left -->
  <g transform="translate(170,400) rotate(270)">
    <circle cx="0" cy="-38" r="16" fill="#ED93B1"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#ED93B1" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#ED93B1" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#ED93B1" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Figure 8 — top-left -->
  <g transform="translate(237,237) rotate(315)">
    <circle cx="0" cy="-38" r="16" fill="#FCDE5A"/>
    <path d="M-18,0 L18,0 L12,44 L-12,44Z" fill="#FCDE5A" opacity="0.9"/>
    <line x1="-18" y1="10" x2="-46" y2="26" stroke="#FCDE5A" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="46" y2="26" stroke="#FCDE5A" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Connecting hands — arcs between each figure to show holding hands -->
  <!-- These are small circles at the "hand meeting points" between figures -->
  <!-- Top to top-right -->
  <circle cx="478" cy="190" r="7" fill="#EF9F27" opacity="0.8"/>
  <!-- top-right to right -->
  <circle cx="608" cy="308" r="7" fill="#5DCAA5" opacity="0.8"/>
  <!-- right to bottom-right -->
  <circle cx="608" cy="492" r="7" fill="#7F77DD" opacity="0.8"/>
  <!-- bottom-right to bottom -->
  <circle cx="478" cy="610" r="7" fill="#F0997B" opacity="0.8"/>
  <!-- bottom to bottom-left -->
  <circle cx="322" cy="610" r="7" fill="#97C459" opacity="0.8"/>
  <!-- bottom-left to left -->
  <circle cx="192" cy="492" r="7" fill="#85B7EB" opacity="0.8"/>
  <!-- left to top-left -->
  <circle cx="192" cy="308" r="7" fill="#ED93B1" opacity="0.8"/>
  <!-- top-left to top -->
  <circle cx="322" cy="190" r="7" fill="#FCDE5A" opacity="0.8"/>

  <!-- Outer decorative dots ring -->
  <circle cx="400" cy="100" r="4" fill="#f9cb42" opacity="0.5"/>
  <circle cx="566" cy="163" r="3" fill="#5DCAA5" opacity="0.5"/>
  <circle cx="700" cy="234" r="3" fill="#7F77DD" opacity="0.4"/>
  <circle cx="700" cy="566" r="3" fill="#F0997B" opacity="0.4"/>
  <circle cx="566" cy="637" r="3" fill="#97C459" opacity="0.5"/>
  <circle cx="400" cy="700" r="4" fill="#85B7EB" opacity="0.5"/>
  <circle cx="234" cy="637" r="3" fill="#ED93B1" opacity="0.5"/>
  <circle cx="100" cy="566" r="3" fill="#FCDE5A" opacity="0.4"/>
  <circle cx="100" cy="234" r="3" fill="#EF9F27" opacity="0.4"/>
  <circle cx="234" cy="163" r="3" fill="#AFA9EC" opacity="0.5"/>

  <!-- Word SOLIDARIDAD at bottom -->
  <text x="400" y="760" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="8" fill="#ffffff" opacity="0.75">SOLIDARIDAD</text>
  <!-- Decorative lines flanking text -->
  <line x1="80" y1="755" x2="220" y2="755" stroke="#f9cb42" stroke-width="0.8" opacity="0.4"/>
  <line x1="580" y1="755" x2="720" y2="755" stroke="#f9cb42" stroke-width="0.8" opacity="0.4"/>
</svg>
